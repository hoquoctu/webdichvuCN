name: webdichvucongnghep
description: "Công ty TNHH Kỹ Thuật Và Vận Tải Thành Thắng - Flutter Web"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Routing
  go_router: ^14.2.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0
  
  # Image loading
  cached_network_image: ^3.3.1
  
  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  url_launcher: ^6.2.5
  
  # Utils
  intl: 0.20.2
  flutter_html: ^3.0.0-beta.2
  share_plus: ^9.0.0
  
  # Responsive
  flutter_screenutil: ^5.9.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  build_runner: ^2.4.8
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
